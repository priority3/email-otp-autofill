<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="styles.css" />
    <title>Email OTP Autofill</title>
    <style>
      body { width: 340px; }
    </style>
  </head>
  <body>
    <main>
      <div class="row">
        <h1 data-i18n="app_title">Email OTP Autofill</h1>
        <select id="uiLang" aria-label="Language" style="width:auto;">
          <option value="zh">中文</option>
          <option value="en">English</option>
        </select>
      </div>
      <div class="card">
        <div class="row">
          <div>
            <div id="code" class="code">------</div>
            <div id="meta" class="muted" style="margin-top:6px;" data-i18n="waiting">Waiting…</div>
          </div>
          <div style="display:flex; flex-direction:column; gap:8px;">
            <button id="fill" class="primary" data-i18n="fill">Fill</button>
            <button id="copy" data-i18n="copy">Copy</button>
          </div>
        </div>

        <div class="hr"></div>
        <div class="row">
          <span id="agent" class="pill">Agent: ?</span>
          <button id="settings" data-i18n="settings">Settings</button>
        </div>
      </div>
    </main>
    <script src="i18n.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
