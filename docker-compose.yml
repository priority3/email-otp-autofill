services:
  agent:
    build:
      context: ./agent
    container_name: email-otp-autofill-agent
    restart: unless-stopped
    environment:
      OTP_AGENT_HOST: 0.0.0.0
      OTP_AGENT_PORT: 17373
      OTP_AGENT_DATA_DIR: /data
      # Master key for at-rest encryption of email credentials. REQUIRED —
      # without it credentials would be stored in plaintext.
      OTP_AGENT_MASTER_KEY: ${OTP_AGENT_MASTER_KEY:-}
      # Admin token for the /admin panel + /v1/admin/* API. Unset = admin disabled.
      OTP_ADMIN_TOKEN: ${OTP_ADMIN_TOKEN:-}
    volumes:
      - ./data:/data
    ports:
      # Bind to localhost only. Exposing it publicly (e.g. a Cloudflare Tunnel
      # or reverse proxy) is the server's own concern, not this project's.
      - "127.0.0.1:17373:17373"
